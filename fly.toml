# fly.toml app configuration file generated for star-client on 2026-03-10T03:10:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'star-client'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
