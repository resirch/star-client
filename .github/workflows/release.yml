name: Build Artifacts

on:
  push:
    branches: ["*"]

permissions:
  contents: read

jobs:
  build-client:
    name: Build star-client (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build star-client
        run: cargo build --release --package star-client

      - name: Upload star-client artifact
        uses: actions/upload-artifact@v4
        with:
          name: star-client-windows
          path: target/release/star-client.exe


